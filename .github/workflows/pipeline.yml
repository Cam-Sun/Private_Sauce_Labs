name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Unit Tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: CI=false npm run build

      - name: Run unit tests
        run: npm run test.coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/coverage-summary.json

  # ── Job 2: Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    needs: unit-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://cam-sun.github.io/Private_Sauce_Labs/staging/
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: CI=false npm run build
        env:
          PUBLIC_URL: /Private_Sauce_Labs/staging

      - name: Deploy to staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          npx gh-pages -d build -b gh-pages --dest staging --add

  # ── Job 3: E2E Tests ──────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: Cam-Sun/private_labs_test
          path: e2e-tests
          token: ${{ secrets.TESTS_REPO_TOKEN }}

      - name: Install test dependencies
        working-directory: e2e-tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e-tests
        run: npm test
        env:
          BASE_URL: https://cam-sun.github.io/Private_Sauce_Labs/staging/
          HEADLESS: true

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: e2e-tests/reports/

  # ── Job 4: Deploy to Production (push to main only) ──────────────────────
  deploy:
    name: Deploy — Production
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cam-sun.github.io/Private_Sauce_Labs/
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: CI=false npm run build

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
        continue-on-error: true

      - name: Download E2E report
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report
          path: e2e-tests/reports
        continue-on-error: true

      - name: Generate dashboard
        run: node scripts/generate-report.js
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          npx gh-pages -d build --add
