name: E2E Tests & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Run Cucumber E2E tests ────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install app dependencies
        run: npm install

      - name: Start app in background
        run: CI=false npm start &
        env:
          BROWSER: none

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: Cam-Sun/private_labs_test
          path: e2e-tests
          token: ${{ secrets.TESTS_REPO_TOKEN }}

      - name: Install test dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install chromium --with-deps

      - name: Run Cucumber E2E tests
        working-directory: e2e-tests
        run: npm test
        env:
          BASE_URL: http://localhost:3000
          HEADLESS: true

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: e2e-tests/reports/

  # ── CD: Deploy to GitHub Pages (push to main only) ───────────────────────
  deploy:
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: CI=false npm run build

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          npm run deploy
